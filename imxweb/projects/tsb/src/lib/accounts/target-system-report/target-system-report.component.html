<div eui-sidesheet-content>
  @if (showHelperAlert) {
    <eui-alert type="info" [condensed]="true" [colored]="true" [dismissable]="true" (dismissed)="onHelperDismissed()">
      <div translate>#LDS#Select a target system. All user accounts of this target system will be included in the report.</div>
    </eui-alert>
  }
  <mat-card class="imx-content-card">
    @if (database) {
      <imx-data-tree
        [withSelectedNodeHighlight]="true"
        data-imx-identifier="target-system-report-data-tree"
        #tree
        [hideSelection]="true"
        [withMultiSelect]="false"
        [database]="database"
        (nodeSelected)="onNodeSelected($event)"
        >
      </imx-data-tree>
    }
  </mat-card>
</div>
<div eui-sidesheet-actions>
  <button [disabled]="selectedEntity == null" color="primary" mat-flat-button (click)="loadReport()">
    {{ '#LDS#Download report' | translate }}
  </button>
</div>
