@if (countMatching > 0) {
  <button
    mat-button
    [ngClass]="{ 'imx-larger-font': isTotal }"
    color="primary"
    [attr.data-imx-identifier]="testId + '-selected-objects-show-matching-objects'"
    (click)="showMatchingObjects($event)"
    >
    <span>(</span>
    <span>{{ countMatching }}</span>
    <span>)</span>
  </button>
}

@if (countMatching === 0) {
  <div class="mat-button" [ngClass]="{ 'imx-larger-font': isTotal }" color="primary">
    <span>(0)</span>
  </div>
}
