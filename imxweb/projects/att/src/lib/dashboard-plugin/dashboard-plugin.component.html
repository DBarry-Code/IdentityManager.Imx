@if (attEnabled && !!pendingItems?.OpenAttestation) {
  <imx-badge-tile
    data-imx-identifier="start-tile-att-approvals"
    [caption]="'#LDS#Heading Attestations to Approve' | translate"
    [tooltip]="'#LDS#Shows pending attestation cases you can approve or deny.' | translate"
    [value]="pendingItems?.OpenAttestation?.toString()"
    [identifier]="'att-approvals'"
    (actionClick)="router.navigate(['attestation', 'decision'])"
    >
  </imx-badge-tile>
}
@if (attEnabled && !!pendingItems?.OpenInquiriesAttestation) {
  <imx-badge-tile
    data-imx-identifier="start-tile-att-inquiries"
    [caption]="'#LDS#Heading Attestation Inquiries' | translate"
    [tooltip]="'#LDS#Shows attestation inquiries that have been sent to you.' | translate"
    [value]="pendingItems?.OpenInquiriesAttestation?.toString()"
    [identifier]="'att-inquiries'"
    (actionClick)="goToAttestationInquiries()"
    >
  </imx-badge-tile>
}
