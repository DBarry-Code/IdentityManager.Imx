<div eui-sidesheet-content>
  @if (data.description) {
    <p>{{ data.description | translate }}</p>
  }
  <form [formGroup]="formGroup" class="imx-rules-violations-action-form">
    @if (data.rulesViolationsApprovals.length > 1) {
      <imx-rules-violations-multi-action [formGroup]="formGroup" [data]="data"> </imx-rules-violations-multi-action>
    }
    @if (data.rulesViolationsApprovals.length === 1) {
      <imx-rules-violations-single-action [formGroup]="formGroup" [data]="data"> </imx-rules-violations-single-action>
    }
  </form>
</div>
<div eui-sidesheet-actions>
  @if (formGroup) {
    <button
      data-imx-identifier="rules-violations-action-button-save"
      mat-flat-button
      color="primary"
      (click)="sideSheetRef.close(true)"
      [disabled]="formGroup.invalid"
      >
      {{ '#LDS#Save' | translate }}
    </button>
  }
</div>
