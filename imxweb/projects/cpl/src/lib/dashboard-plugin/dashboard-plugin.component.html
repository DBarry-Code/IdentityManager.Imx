@if (isExceptionAdmin && !!pendingItems?.OpenNonCompliance) {
  <imx-badge-tile
    data-imx-identifier="cpl-dashboard--plugin-badge-tile-violations-approvals"
    [caption]="'#LDS#Heading Rule Violations to Approve' | translate"
    [tooltip]="'#LDS#Shows pending rule violations for which you can grant or deny exceptions.' | translate"
    [value]="pendingItems?.OpenNonCompliance?.toString()"
    [identifier]="'cpl-rule-violation-approvals'"
    (actionClick)="router.navigate(['compliance', 'rulesviolations', 'approve'])"
    >
  </imx-badge-tile>
}
