<div class="imx-parameter-container">
  @for (textToken of textTokens; track textToken) {
    @if (!textToken.isParameter) {
      <span>{{ textToken.value }}</span>
    }
    @if (textToken.isParameter) {
      <strong>{{ textToken.value }}</strong>
    }
  }

  @if (additionalText !== '') {
    <span>{{ '; ' + additionalText }}</span>
  }
</div>
