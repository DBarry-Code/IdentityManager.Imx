@if (options && !loading) {
  <eui-select
    (selectionChange)="selectionUpdated($event)"
    label="{{ '#LDS#Table' | translate }}"
    [filterFunction]="filter"
    [options]="options"
    [inputControl]="control"
    [hideClearButton]="true"
    [feedbackMessages]="elementalUiConfigService.SelectFeedbackMessages"
    data-imx-identifier="fk-table-select"
    >
  </eui-select>
}

@if (loading) {
  <mat-spinner diameter="30"></mat-spinner>
}
