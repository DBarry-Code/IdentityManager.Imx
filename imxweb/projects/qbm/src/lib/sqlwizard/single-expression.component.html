<div class="expression">
  @if (expr.isSimple()) {
    <imx-sqlwizard-simpleexpression class="flex flex-grow" [expr]="expr" (change)="emitChanges()"> </imx-sqlwizard-simpleexpression>
  }
  @if (!expr.isSimple()) {
    <imx-sqlwizard-whereclauseexpression class="flex flex-grow" [expr]="expr" (change)="emitChanges()">
    </imx-sqlwizard-whereclauseexpression>
  }
  <div class="remove-btn">
    @if (expr.canRemove()) {
      <button
        (click)="removeExpression()"
        data-imx-identifier="single-expr-button-remove"
        mat-icon-button
        [matTooltip]="'#LDS#Remove condition' | translate"
      >
        <eui-icon icon="close" size="20"></eui-icon>
      </button>
    }
  </div>
</div>
@if (!!expr.childViews.length) {
  <mat-list>
    @for (cexpr of expr.childViews; track cexpr; let first = $first; let last = $last) {
      @if (!first) {
        <div class="selected-logical-op">
          <button
            mat-button
            color="primary"
            class="imx-btn-color-default"
            (click)="onOperatorChanged()"
            [matTooltip]="logOpTooltip() | translate"
          >
            {{ logOpText() | translate }}
            <eui-icon icon="scrolldown" size="20"></eui-icon>
          </button>
        </div>
      }
      <li class="expression-container">
        <imx-sqlwizard-singleexpression [expr]="cexpr" [viewSettings]="viewSettings" [first]="first" [last]="last" (change)="emitChanges()">
        </imx-sqlwizard-singleexpression>
      </li>
    }
  </mat-list>
}

@if (showAddCondition) {
  <button
    mat-icon-button
    color="primary"
    class="imx-btn-color-default"
    (click)="addExpression()"
    [matTooltip]="'#LDS#Add condition' | translate"
  >
    <eui-icon icon="add" size="20"></eui-icon>
  </button>
}
