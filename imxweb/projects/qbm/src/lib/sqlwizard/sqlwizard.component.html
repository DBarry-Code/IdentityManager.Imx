@if (viewSettings) {
  <mat-list class="expression-list">
    @for (expr of viewSettings.root.childViews; track expr; let i = $index; let first = $first; let last = $last) {
      @if (!first) {
        <div class="selected-logical-op">
          <button
            mat-button
            color="primary"
            class="imx-btn-color-default"
            (click)="onOperatorChanged()"
            [matTooltip]="logOpTooltip() | translate"
          >
            {{ logOpText() | translate }}
            <eui-icon icon="scrolldown" size="20"></eui-icon>
          </button>
        </div>
      }
      <li class="expression-container" #expressionItem>
        <imx-sqlwizard-singleexpression [expr]="expr" [first]="first" [last]="last" (change)="emitChanges()">
        </imx-sqlwizard-singleexpression>
      </li>
    }
  </mat-list>
  <button
    mat-icon-button
    color="primary"
    class="imx-btn-color-default"
    (click)="addExpression()"
    [matTooltip]="'#LDS#Add condition' | translate"
  >
    <eui-icon icon="add" size="20"></eui-icon>
  </button>
}
