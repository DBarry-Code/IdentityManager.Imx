<ng-container matColumnDef>
  <mat-header-cell class="imx_ColumnHeader" *matHeaderCellDef>
    <!-- use header template, if available-->
    @if (headerTemplate) {
      <ng-container [ngTemplateOutlet]="headerTemplate"></ng-container>
    }

    <!-- Write title or field, if no header template defined-->
    @if (!headerTemplate) {
      <div>{{title || field}}</div>
    }
  </mat-header-cell>
  <mat-cell *matCellDef="let data; let index = index" class="imx_ColumnCell">
    @if (isFirstColumn) {
      <a [ngStyle]="{'margin-left': getMargin(data)}" [class]="ButtonClass(data)" (click)="buttonClicked(data)"> </a>
    }
    <!-- Use cellTemplate, if available-->
    @if (cellTemplate) {
      <ng-container
        style="display: inline-block"
        [ngTemplateOutlet]="cellTemplate"
        [ngTemplateOutletContext]="{data:data.data, rowIndex:index}"
      ></ng-container>
    }
    <!-- Write value, if no cell template defined -->
    @if (!cellTemplate) {
      <div [class]="getClass(data)" style="display: inline-block">{{getData(data,index)}}</div>
    }
  </mat-cell>
</ng-container>
