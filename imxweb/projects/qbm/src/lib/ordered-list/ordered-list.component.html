@if (data.length > 0) {
  <div cdkDropList class="ordered-list" (cdkDropListDropped)="drop($event)">
    @for (elem of data; track trackByFn(idx, elem); let idx = $index) {
      <div class="ordered-box" cdkDrag [cdkDragPreviewClass]="theme">
        <mat-form-field appearance="outline" class="ordered-formfield">
          <mat-label>{{ placeholder }}</mat-label>
          <div class="ordered-list--placeholder" *cdkDragPlaceholder></div>
          <mat-select [disabled]="isReadOnly" (selectionChange)="optionSelected()" [(ngModel)]="data[idx]">
            @for (pr of dataSource; track pr) {
              <mat-option [value]="pr?.Name">
                {{ pr?.Display }}
              </mat-option>
            }
          </mat-select>
        </mat-form-field>
        <button
          [disabled]="isReadOnly"
          mat-icon-button
          [attr.aria-label]="deleteText"
          [attr.data-imx-identifier]="testId + '-delete'"
          (click)="deleteElement(idx)"
          >
          <eui-icon icon="delete"></eui-icon>
        </button>
      </div>
    }
  </div>
}

<div class="imx-margin-vertical-15">
  <button [disabled]="isReadOnly" [attr.data-imx-identifier]="testId + '-add'" mat-flat-button color="primary" (click)="addNew()">
    {{ addNewText }}
  </button>
</div>
