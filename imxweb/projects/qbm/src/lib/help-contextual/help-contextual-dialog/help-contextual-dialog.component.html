<div class="dialog-container">
  <h2 mat-dialog-title translate>{{ dialogHeading }}</h2>
  <mat-dialog-content>
    @for (detail of dialogDetails; track detail) {
      <div translate class="imx-margin-bottom-5">{{ detail }}</div>
    }
    @if (data.templateRef) {
      <ng-template [cdkPortalOutlet]="data.templateRef"></ng-template>
    }
    <div class="dialog-content__links">
      @for (link of data.Links; track link) {
        <a [href]="getHelpLink(link)" target="_blank" translate>{{ link.Title }}</a>
      }
    </div>
  </mat-dialog-content>
  <mat-dialog-actions>
    <button mat-flat-button color="primary" mat-dialog-close>
      {{ '#LDS#Close' | translate }}
    </button>
  </mat-dialog-actions>
</div>
