<mat-card class="card">
  <imx-data-view-toolbar [dataSource]="dataSource" [showSettings]="false"></imx-data-view-toolbar>
  <imx-data-view-auto-table

    [noDataText]="dataSource.state()?.search || dataSource.selectedFilters().length > 0 ? null : '#LDS#Enter the name of an object you want to search for in the database.'"
  ></imx-data-view-auto-table>

</mat-card>
