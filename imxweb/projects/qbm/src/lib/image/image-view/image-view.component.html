<div class="imx-readonly-view" readonly>
  <span class="column-display">{{ valueWrapper.display | translate }}</span>
  @if (valueWrapper?.value?.length) {
    <img
      [src]="imageProvider.addBase64Prefix(valueWrapper.value)"
      [alt]="valueWrapper.display | translate"
      />
  }
  @if (!valueWrapper?.value?.length || valueWrapper?.value?.length === 0) {
    <span class="column-value">{{ defaultValue | translate }}</span>
  }
</div>
