<imx-hyperview-shape [shape]="shape" (changeContentSize)="onChangeContentSize()">
  <ul ShapeContent>
    @for (elem of shape.Elements; track elem) {
      <li [class.imx-hyperview-deleted]="IsDeleted(elem)">
        @if (isLinkEnabled(elem)) {
          <a (click)="click(elem)">{{ elem.DisplayValue }}</a>
        }
        @if (!isLinkEnabled(elem)) {
          {{ elem.DisplayValue }}
        }
      </li>
    }
  </ul>
</imx-hyperview-shape>
