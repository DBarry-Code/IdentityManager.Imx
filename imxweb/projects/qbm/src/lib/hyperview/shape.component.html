<header class="imx-hyperview-shape-header">
  <div class="{{ imageClass }} imx-hyperview-shape-header-image"></div>
  <h4 class="imx-shape-header-info" [matTooltip]="shape.Description">
    <div class="imx-hyperview-header">{{ shape.HeaderText }}</div>
    <div class="imx-hyperview-caption" [ngClass]="{ 'imx-hyperview-caption--link': navigate }" (click)="click()">
      {{ shape.Caption }}
      @if (ObjectCount > -1) {
        <span class="objectcount"> ({{ ObjectCount }})</span>
      }
    </div>
  </h4>
  @if (canExpand) {
    <button mat-icon-button [attr.aria-label]="(isExpanded ? '#LDS#Collapse' : '#LDS#Expand') | translate" (click)="setExpandable()">
      <eui-icon [icon]="isExpanded ? 'collapseup' : 'collapsedown'"></eui-icon>
    </button>
  }
</header>
@if (showContent) {
  <section class="imx-hyperview-shape-content">
    <ng-content select="[ShapeContent]"></ng-content>
  </section>
}
