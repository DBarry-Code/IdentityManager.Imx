<div eui-sidesheet-content>
  <mat-card class="imx-dialog-content">
    @if (data?.isRequired && (fkSelector?.dataSource?.selection?.selected?.length ?? 0) < 1) {
      <eui-alert class="imx-margin-bottom-20" [condensed]="true" [colored]="true" type="info" [dismissable]="false"
        >
        {{ '#LDS#Select at least one item.' | translate }}
      </eui-alert>
    }
    <imx-fk-selector 
      #fkSelector
      [data]="data"
      (tableSelected)="updateTable($event)"
      ></imx-fk-selector>
  </mat-card>
</div>

<div eui-sidesheet-actions>
  <button
    mat-flat-button
    color="primary"
    [disabled]="data?.isRequired && (fkSelector?.dataSource?.selection?.selected?.length ?? 0) < 1"
    (click)="applySelection()"
    data-imx-identifier="cdr-fkadvancedpicker-button-apply-selection"
    >
    {{ '#LDS#Select' | translate }}
  </button>
</div>
