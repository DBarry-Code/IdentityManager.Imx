<eui-icon class="imx-search-image" size="s" icon="search"></eui-icon>
<input
  type="text"
  class="no-focus-outline"
  [placeholder]="placeholder"
  (keyup.enter)="EmitValueChangedEvent()"
  matInput
  [matAutocomplete]="auto"
  [(ngModel)]="filterText"
  (ngModelChange)="filterOptions()"
  />
@if (filterText !== '') {
  <button mat-icon-button (click)="clearText()">
    <eui-icon icon="close"></eui-icon>
  </button>
}

<mat-autocomplete #auto="matAutocomplete" (optionSelected)="EmitValueChangedEvent()">
  @for (option of filteredOptions; track option) {
    <mat-option [value]="option">
      {{ option }}
    </mat-option>
  }
</mat-autocomplete>
