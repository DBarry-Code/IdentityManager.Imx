<div class="imx-data-view-controls">
  @if (showSearch) {
    <imx-data-view-search
      [dataSource]="dataSource"
      (onSearchChange)="onSearchChange.emit($event)"
      [searchPlaceholder]="searchPlaceholder"
    ></imx-data-view-search>
  }
  @if (!!dataSource.groupOptions.length && showGrouping) {
    <imx-data-view-group [dataSource]="dataSource"></imx-data-view-group>
  }
  @if (dataSource.showFilters()) {
    <imx-data-view-filter [dataSource]="dataSource"></imx-data-view-filter>
  }
  @if (showSettings) {
    <imx-data-view-settings
      [dataSource]="dataSource"
      (updateConfig)="updateConfig.emit($event)"
      (deleteConfigById)="deleteConfigById.emit($event)"
    ></imx-data-view-settings>
  }
  @if (dataSource.isLimitReached()) {
    <eui-icon
      icon="warning"
      class="imx-icon-warning"
      matTooltip="{{ '#LDS#There are too many results for this search. Narrow the search query with more specific keywords.' | translate }}"
    >
    </eui-icon>
  }
  <ng-content></ng-content>
</div>
<imx-data-view-chipbar [dataSource]="dataSource"></imx-data-view-chipbar>
