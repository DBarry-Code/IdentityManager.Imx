<div eui-sidesheet-content class="container">
  <mat-card class="imx-card-border block-details">
    <div class="cdr-list">
      @for (cdr of topCdrList; track cdr) {
        <imx-cdr-editor [cdr]="cdr"></imx-cdr-editor>
      }
    </div>
    <div class="cdr-list">
      @for (cdr of bottomCdrList; track cdr) {
        <imx-cdr-editor [cdr]="cdr"></imx-cdr-editor>
      }
    </div>
  </mat-card>

  <mat-card class="imx-card-border">
    @if (hasHistory) {
      <div>
        <div class="history-title">
          <mat-card-title>
            {{ '#LDS#Heading History' | translate }}
          </mat-card-title>
          <mat-card-subtitle>
            {{ '#LDS#Status of the object over time' | translate }}
          </mat-card-subtitle>
        </div>
        <div #chartWrapper class="imx-chart-container-full">
          <eui-billboard [options]="chartOptions" (chart)="saveChart($event)" [ngStyle]="{ opacity: isLoading ? '0' : '1' }"></eui-billboard>
        </div>
        <div class="legend-wrapper">
          <imx-discrete-legend></imx-discrete-legend>
        </div>
      </div>
    }

    @if (!hasHistory) {
      <div class="imx-no-results">
        <eui-icon icon="content-alert"></eui-icon>
        <p>{{ '#LDS#There is currently no history available.' | translate }}</p>
      </div>
    }
  </mat-card>
</div>
