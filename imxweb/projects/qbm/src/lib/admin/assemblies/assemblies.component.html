<div class="imx-header-toolbar">
  <h2 class="mat-headline-5">
    {{ '#LDS#Heading Loaded Assemblies' | translate }}
  </h2>
</div>
<mat-card class="imx-card-fill">
  <imx-data-view-auto-table
    [dataSource]="dataSource"
    mode="manual"
    matSort
    (matSortChange)="dataSource?.sortChange($event)"
    [matSortActive]="dataSource.sortId()"
  >
    <ng-container [matColumnDef]="entitySchema.Columns.Name.ColumnName">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>
        {{ '#LDS#Assembly name' | translate }}
      </th>
      <td mat-cell *matCellDef="let item" role="gridcell">
        <span>
          {{ item.GetEntity().GetColumn('Name').GetDisplayValue() }}
        </span>
      </td>
    </ng-container>
    <ng-container [matColumnDef]="entitySchema.Columns.Version.ColumnName">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>
        {{ '#LDS#Version' | translate }}
      </th>
      <td mat-cell *matCellDef="let item" role="gridcell">
        <span>
          {{ item.GetEntity().GetColumn('Version').GetDisplayValue() }}
        </span>
      </td>
    </ng-container>
  </imx-data-view-auto-table>
  <imx-data-view-paginator [dataSource]="dataSource"></imx-data-view-paginator>
</mat-card>
