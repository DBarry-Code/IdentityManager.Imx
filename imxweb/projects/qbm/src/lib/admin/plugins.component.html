<div class="flex-container">
  <h2 class="mat-headline-5" translate>#LDS#Heading Plugins</h2>

  <table class="plugin-table" data-imx-identifier="admin-status-plugins">
    <tbody>
      @for (p of plugins; track p) {
        <tr>
          <td>
            {{ p.Plugin }}
          </td>
          <td>
            @if (p.Exception) {
              <eui-alert [dismissable]="false" type="error" class="mat-elevation-z0">
                <eui-alert-header class="mat-elevation-z0">{{ p.Exception }}</eui-alert-header>
              </eui-alert>
            }
            @if (!p.Exception) {
              <mat-icon icon="check">check</mat-icon>
              {{ '#LDS#Running' | translate }}
            }
          </td>
        </tr>
      }
    </tbody>
  </table>
</div>
