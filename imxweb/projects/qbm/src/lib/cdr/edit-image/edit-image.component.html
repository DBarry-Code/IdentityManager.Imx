<input [hidden]="true" #file type="file" multiple="false" accept="image/png" (change)="emitFiles($event.target)" />

@if (columnContainer?.canEdit) {
  <imx-image-select
    [valueWrapper]="columnContainer"
    [control]="control"
    [fileFormatHint]="fileFormatHint"
    [isLoading]="isLoading"
    (change)="resetFileFormatErrorState(); file.click()"
    (remove)="remove()"
    >
  </imx-image-select>
} @else {
  <imx-image-view [valueWrapper]="columnContainer" defaultValue="#LDS#Not set"></imx-image-view>
}
