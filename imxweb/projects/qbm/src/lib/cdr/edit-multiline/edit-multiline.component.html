@if (columnContainer?.canEdit) {
  <mat-form-field class="imx-form-field-width-full" appearance="outline">
    <mat-label> {{ columnContainer.display | translate }} </mat-label>
    <textarea
      matInput
      cdkTextareaAutosize
      cdkAutosizeMaxRows="5"
      class="imx-textarea-content-box"
      [readonly]="!columnContainer.canEdit"
      [formControl]="control"
      [attr.data-imx-identifier]="'cdr-edit-multiline-textarea-' + columnContainer.name"
      [required]="columnContainer.isValueRequired"
    ></textarea>
    <div matSuffix class="imx-suffix-container">
      @if (isBusy()) {
        <mat-spinner diameter="30"></mat-spinner>
      }
    </div>
    @if (control.errors?.['required']) {
      <mat-error>
        {{ '#LDS#This field is mandatory.' | translate }}
      </mat-error>
    }
    @if (control.errors?.['generalError']) {
      <mat-error>
        {{ validationErrorMessage }}
      </mat-error>
    }
  </mat-form-field>
} @else {
  <imx-view-property [columnContainer]="columnContainer" defaultValue="#LDS#Not set"> </imx-view-property>
}
