@if (columnContainer?.canEdit) {
  <div>
    <div class="imx-slider-label-container">
      <label class="slider-label__main">{{ columnContainer.display | translate }}: {{ control.value | formatNumber }}</label>
      @if (isBusy()) {
        <div class="imx-suffix-container">
          <mat-spinner diameter="30"></mat-spinner>
        </div>
      }
    </div>
    <div class="imx-slider-container imx-padding-bottom-10">
      <mat-label class="slider-label__prefix">{{ minValue }}</mat-label>
      <mat-slider
        class="imx-risk-slider"
        [min]="minValue"
        [max]="maxValue"
        [step]="0.1"
        [discrete]="true"
        [disabled]="!columnContainer?.canEdit"
        [attr.data-imx-identifier]="'cdr-risk-index-slider-' + columnContainer?.name"
        [displayWith]="formatLabel"
        showTickMarks
        ><input matSliderThumb [formControl]="control" (dragEnd)="onDragEnd($event)" />
      </mat-slider>
      <mat-label class="slider-label__suffix">{{ maxValue }}</mat-label>
    </div>
  </div>
} @else {
  <imx-view-property [columnContainer]="columnContainer" defaultValue="#LDS#Not set"> </imx-view-property>
}
<!-- template for read only elements-->
