@if (columnContainer?.canEdit) {
  <eui-select
    class="imx-bitmask-select"
    [label]="columnContainer?.display || '' | translate"
    [placeholder]="'#LDS#Select one or more items' | translate"
    [multiple]="true"
    [hidePanelFooter]="true"
    [useLegacyFloatingLabel]="true"
    [options]="options"
    [formControl]="control"
    [feedbackMessages]="elementalUiConfigService.SelectFeedbackMessages"
    >
  </eui-select>
} @else {
  <imx-view-property [columnContainer]="columnContainer" defaultValue="#LDS#Not set"> </imx-view-property>
}
