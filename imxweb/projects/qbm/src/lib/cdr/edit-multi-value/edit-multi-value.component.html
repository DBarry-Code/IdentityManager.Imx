@if (columnContainer?.canEdit) {
  <mat-form-field class="imx-form-field-width-full" appearance="outline">
    <mat-label>{{ columnContainer.display | translate }}</mat-label>
    <textarea
      matInput
      cdkTextareaAutosize
      [readonly]="!columnContainer?.canEdit"
      [formControl]="control"
      [attr.data-imx-identifier]="'cdr-edit-multi-value-textarea-' + columnContainer?.name"
      [required]="columnContainer.isValueRequired"
    ></textarea>
    @if (control.errors?.['required']) {
      <mat-error>
        {{ '#LDS#This field is mandatory.' | translate }}
      </mat-error>
    }
  </mat-form-field>
} @else {
  <imx-view-property [columnContainer]="columnContainer" defaultValue="#LDS#Not set"> </imx-view-property>
}
