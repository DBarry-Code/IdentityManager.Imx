<div eui-sidesheet-content>
  <imx-usermessage class="imx-errormessages" panelClass="imx-small-message" [target]="'sidesheet'"></imx-usermessage>
  <mat-card>
    @if (!data.pattern.IsPublicPattern.value) {
      <eui-badge class="imx-margin-bottom-20">
        {{ '#LDS#Private product bundle' | translate }}
      </eui-badge>
    }
    @if (data?.pattern?.IsPublicPattern?.value) {
      <eui-badge class="imx-margin-bottom-20" color="green">
        {{ '#LDS#Public product bundle' | translate }}
      </eui-badge>
    }
    @for (cdr of cdrList; track cdr) {
      <imx-cdr-editor [cdr]="cdr" (controlCreated)="formArray.push($event)"> </imx-cdr-editor>
    }
  </mat-card>
</div>
<div eui-sidesheet-actions>
  <button
    mat-flat-button
    color="primary"
    data-imx-identifier="itshop-pattern-sidesheet-button-toggle-create"
    [disabled]="!detailsFormGroup.dirty || detailsFormGroup.invalid"
    (click)="save()"
    >
    {{ '#LDS#Create' | translate }}
  </button>
</div>
