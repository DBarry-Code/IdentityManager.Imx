<imx-tile size="Custom-Tile" [attr.data-imx-identifier]="'iconTile' + identifier" [identifier]="identifier" [loadingState]="loadingState">
  <ng-template #CustomTemplate>
    <mat-card-title class="imx-card-title-m" [matTooltip]="caption">
      @if (image) {
        <eui-icon data-imx-identifier="iconTile-eui-icon" size="m" icon="{{ image }}"></eui-icon>
      }
      <h3>{{ caption }}</h3>
    </mat-card-title>
    <mat-card-subtitle>
      <div>{{ subtitle }}</div>
    </mat-card-subtitle>
    @if (actionTemplate) {
      <mat-card-actions align="start">
        <ng-container *ngTemplateOutlet="actionTemplate"> </ng-container>
      </mat-card-actions>
    }
  </ng-template>
</imx-tile>
