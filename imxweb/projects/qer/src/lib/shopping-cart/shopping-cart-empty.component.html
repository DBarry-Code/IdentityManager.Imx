<h2 class="mat-headline-5">
  <span>{{ '#LDS#Heading Shopping Cart' | translate }}</span>
  <imx-help-contextual></imx-help-contextual>
</h2>

<div class="card-container">
  <mat-card class="card">
    <mat-card-header class="card-header">
      <div mat-card-avatar class="card-avatar">
        <eui-icon icon="cart" size="l"></eui-icon>
      </div>
      <mat-card-title>
        {{ '#LDS#Your shopping cart is currently empty.' | translate }}
      </mat-card-title>
    </mat-card-header>
    <button
      mat-flat-button
      color="primary"
      type="button"
      [routerLink]="['/newrequest/allProducts']"
      data-imx-identifier="emptycart-link-newproducts"
    >
      {{ '#LDS#Start new request' | translate }}
    </button>
    <mat-divider class="imx-divider-dashed"></mat-divider>
    <button 
      mat-stroked-button
      type="button"
      [routerLink]="['/requesthistory']"
      data-imx-identifier="emptycart-link-requesthistory"
    >
      {{ '#LDS#View request history' | translate }}
    </button>
    <button 
      mat-stroked-button
      type="button" 
      [routerLink]="['/shoppingcart/later']"
      data-imx-identifier="emptycart-link-saveforlater"
    >
      {{ '#LDS#View saved for later list' | translate }}
    </button>
  </mat-card>
</div>
