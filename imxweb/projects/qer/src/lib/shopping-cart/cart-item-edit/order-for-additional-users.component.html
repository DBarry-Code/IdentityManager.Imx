<div eui-sidesheet-content>
  <mat-card>
    <p>{{ LdsExplanation | translate | ldsReplace: [data.display] }}</p>
    <imx-fk-selector #fkSelector [data]="data.fkData"></imx-fk-selector>
  </mat-card>
</div>

<div eui-sidesheet-actions>
  <button
    mat-flat-button
    color="primary"
    (click)="close(fkSelector?.dataSource?.selection?.selected)"
    [disabled]="(fkSelector?.dataSource?.selection?.selected?.length ?? 0) < 1"
    data-imx-identifier="order-additional-button-apply"
    >
    {{ '#LDS#Apply' | translate }}
  </button>
</div>
