<div eui-sidesheet-content>
  <mat-card>
    <!-- role creation errors should appear here -->
    @if (errorState) {
      <imx-usermessage class="errormessages" panelClass="imx-small-message" [target]="'sidesheet'"></imx-usermessage>
    }

    <form class="imx-cdr-group" [formGroup]="formGroup">
      @for (cdr of cdrList; track cdr) {
        <imx-cdr-editor [cdr]="cdr" (controlCreated)="addControl(cdr?.column?.ColumnName, $event)"> </imx-cdr-editor>
      }
    </form>
  </mat-card>
</div>
<div eui-sidesheet-actions>
  <button
    data-imx-identifier="new-role-button-create"
    mat-flat-button
    color="primary"
    [disabled]="formGroup.invalid || !formGroup.dirty"
    (click)="save()"
    >
    <span translate>#LDS#Create</span>
  </button>
</div>
