<div eui-sidesheet-content>
  <mat-card class="imx-card-sidesheet">
    <form [formGroup]="form" id="form" (ngSubmit)="save()">
      @for (cdr of cdrList; track cdr) {
        <imx-cdr-editor
          [cdr]="cdr"
          (controlCreated)="addFormControl(cdr?.column?.ColumnName ?? '', $event)"
          [attr.data-imx-identifier]="'edit-service-category-property-' + cdr.column.ColumnName"
          >
        </imx-cdr-editor>
      }
      <imx-service-item-select [data]="serviceItemData" (controlCreated)="addFormControl('serviceitems', $event)"></imx-service-item-select>
    </form>
  </mat-card>
</div>

<div eui-sidesheet-actions>
  @if (canDelete) {
    <button
      class="justify-start"
      mat-stroked-button
      color="warn"
      (click)="delete()"
      data-imx-identifier="edit-service-category-button-delete"
      >
      <eui-icon icon="delete"></eui-icon>
      {{ '#LDS#Delete service category' | translate }}
    </button>
  }
  <button
    mat-flat-button
    [disabled]="form.pristine || form.invalid"
    type="submit"
    (click)="ieSave()"
    form="form"
    color="primary"
    data-imx-identifier="edit-service-category-button-save"
    >
    {{ '#LDS#Save' | translate }}
  </button>
</div>
