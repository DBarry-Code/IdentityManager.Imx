@if (!isEnteringPasscode) {
  <div class="imx-loginInput">
    <eui-form-field>
      <eui-label>{{ '#LDS#User' | translate }}</eui-label>
      <input
        matInput
        class="imx-input-login"
        placeholder="{{ '#LDS#User' | translate }}"
        type="text"
        [(ngModel)]="userName"
        [attr.data-imx-identifier]="'pwd-username'"
        [required]="true"
      />
    </eui-form-field>
    <imx-captcha [disableButton]="!userName" (nextClick)="MoveToEnterPasscode()"></imx-captcha>
  </div>
}

@if (isEnteringPasscode) {
  <div class="imx-loginInput">
    <div class="passcode">
      <eui-form-field>
        <eui-label>{{ '#LDS#Passcode' | translate }}</eui-label>
        <input
          matInput
          class="imx-input-login"
          placeholder="{{ '#LDS#Passcode' | translate }}"
          type="password"
          [(ngModel)]="passcode"
          [attr.data-imx-identifier]="'passcode'"
          [required]="true"
        />
      </eui-form-field>
      <div class="buttonbar">
        <button mat-flat-button type="button" color="primary" [disabled]="!passcode" (click)="Login()">
          <eui-icon icon="signin" size="s"></eui-icon> {{ '#LDS#Log in' | translate }}
        </button>
      </div>
    </div>
  </div>
}
