@if (inactiveResponsibilitiesCount > 0) {
  <imx-badge-tile
    data-imx-identifier="imx-dashboard-team-responsibilities-tile"
    [caption]="'#LDS#Heading Actions Needed' | translate"
    [tooltip]="'#LDS#Shows responsibilities of your reports for which actions are needed.' | translate"
    [value]="inactiveResponsibilitiesCount.toString()"
    [identifier]="'imx-team-responsibilities-tile'"
    (actionClick)="router.navigate(['teamresponsibilities'])"
    >
  </imx-badge-tile>
}
