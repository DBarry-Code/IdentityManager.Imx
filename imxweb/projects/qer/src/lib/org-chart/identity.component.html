@if (identity) {
  <div class="identity-photo">
    <div
      class="identity-photo-overlay"
    [ngStyle]="{
      'background-image': 'url(\'' + orgChartService.BaseUrl + '/portal/person/image/' + identity.GetEntity().GetKeys()[0] + '\')'
    }"
    ></div>
    <eui-icon icon="user"></eui-icon>
  </div>
}
@if (identity) {
  <div class="identity-info">
    <div class="identity-name">
      {{ identity.GetEntity().GetDisplay() }}
    </div>
    <div class="identity-title">
      {{ buildSubTitle() }}
    </div>
  </div>
}
