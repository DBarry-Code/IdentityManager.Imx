<div eui-sidesheet-content>
  <form [formGroup]="formGroup" class="imx-policy-violation-content">
    @if (data.description) {
      <p>{{ data.description | translate }}</p>
    }
    @if (data.policyViolations.length > 1) {
      <imx-policy-violations-action-multi-action [formGroup]="formGroup" [data]="data"></imx-policy-violations-action-multi-action>
    }
    @if (data.policyViolations.length === 1) {
      <imx-policy-violations-action-single-action [formGroup]="formGroup" [data]="data"></imx-policy-violations-action-single-action>
    }
  </form>
</div>
<div eui-sidesheet-actions>
  @if (formGroup) {
    <button
      data-imx-identifier="policy-violation-action-button-save"
      mat-flat-button
      color="primary"
      (click)="sideSheetRef.close(true)"
      [disabled]="formGroup.invalid"
      >
      {{ '#LDS#Save' | translate }}
    </button>
  }
</div>
