@if (hasPendingItems()) {
  <imx-badge-tile
    data-imx-identifier="pol-dashboard--plugin-badge-tile-violations-approvals"
    [caption]="'#LDS#Heading Policy Violations to Approve' | translate"
    [tooltip]="'#LDS#Shows pending policy violations for which you can grant or deny exceptions.' | translate"
    [value]="pendingItems.OpenQERPolicyHasObject!.toString()"

    (actionClick)="router.navigate(['compliance', 'policyviolations', 'approve'])"
    >
  </imx-badge-tile>
}
