<div eui-sidesheet-content class="imx-flex-content">
  <imx-list-report-viewer [dataService]="data.dataService" [reportParameter]="reportParameter"></imx-list-report-viewer>
</div>
@if (data.subscription) {
  <div eui-sidesheet-actions>
    <button color="primary" mat-flat-button (click)="downloadReport()" data-imx-identifier="view-config-download-report-button">
      {{ '#LDS#Download report' | translate }}
    </button>
  </div>
}
