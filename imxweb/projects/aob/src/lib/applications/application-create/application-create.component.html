<mat-card eui-sidesheet-content class="imx-content">
  <p translate>#LDS#Add an icon, name and description to the application and assign a manager to it.</p>

  <form class="imx-form" id="form" [formGroup]="form">
    <imx-application-image-select
      class="imx-select"
      [column]="imageColumn"
      (controlCreated)="form.addControl(imageColumn.ColumnName, $event)"
    >
    </imx-application-image-select>
    @if (name) {
      <imx-cdr-editor class="imx-select" [cdr]="name" (controlCreated)="form.addControl(name.column.ColumnName, $event)"> </imx-cdr-editor>
    }
    @if (description) {
      <imx-cdr-editor class="imx-select" [cdr]="description" (controlCreated)="form.addControl(description.column.ColumnName, $event)">
      </imx-cdr-editor>
    }
    @if (serviceCategory) {
      <imx-cdr-editor
        class="imx-select"
        [cdr]="serviceCategory"
        (valueChange)="updateName($event)"
        (controlCreated)="form.addControl(serviceCategory.column.ColumnName, $event)"
      >
      </imx-cdr-editor>
    }
    @if (manager) {
      <imx-cdr-editor class="imx-select" [cdr]="manager" (controlCreated)="form.addControl(manager.column.ColumnName, $event)">
      </imx-cdr-editor>
    }
    @if (owner) {
      <imx-cdr-editor class="imx-select" [cdr]="owner" (controlCreated)="form.addControl(owner.column.ColumnName, $event)">
      </imx-cdr-editor>
    }
    @if (applicationType) {
      <imx-cdr-editor class="imx-select" [cdr]="applicationType" (controlCreated)="form.addControl(owner.column.ColumnName, $event)">
      </imx-cdr-editor>
    }
    @if (personMachineIdentity) {
      <imx-cdr-editor class="imx-select" [cdr]="personMachineIdentity" (controlCreated)="form.addControl(owner.column.ColumnName, $event)">
      </imx-cdr-editor>
    }
  </form>
</mat-card>

<div eui-sidesheet-actions class="imx-button-bar">
  <button
    data-imx-identifier="createApp-save"
    mat-flat-button
    color="primary"
    type="button"
    (click)="save()"
    form="form"
    [disabled]="!form.dirty || form.invalid"
  >
    <span translate>#LDS#Save</span>
  </button>
</div>
