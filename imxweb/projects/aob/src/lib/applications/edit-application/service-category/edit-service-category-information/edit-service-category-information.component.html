<div eui-sidesheet-content>
  <mat-card>
    <form [formGroup]="formGroup">
      @for (cdr of cdrList; track cdr) {
        <imx-cdr-editor
          [cdr]="cdr"
          [attr.data-imx-identifier]="'edit-service-category-information-' + cdr?.column?.ColumnName"
          (controlCreated)="formGroup.controls.cdrArray.push($event)"
          >
        </imx-cdr-editor>
      }
    </form>
  </mat-card>
</div>
<div eui-sidesheet-actions>
  <button
    [disabled]="!formGroup.dirty || formGroup.invalid"
    mat-flat-button
    data-imx-identifier="edit-service-category-information-button-save"
    color="primary"
    (click)="save()"
    >
    <span translate>#LDS#Save</span>
  </button>
</div>
