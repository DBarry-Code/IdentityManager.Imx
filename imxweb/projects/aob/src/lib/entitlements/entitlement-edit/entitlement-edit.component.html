<div eui-sidesheet-content>
  <mat-card class="imx-card-sidesheet">
    <form class="imx-form" id="entitlementForm" [formGroup]="form">
      @for (cdr of cdrList; track cdr) {
        <imx-cdr-editor [cdr]="cdr" (controlCreated)="form.addControl(cdr?.column?.ColumnName || '', $event)">
        </imx-cdr-editor>
      }
      @if (serviceItem) {
        @if (productTagsSelected) {
          <imx-service-item-tags
            [selection]="productTagsSelected"
            [loading]="loadingTags"
            (controlCreated)="form.addControl('tags', $event)"
            >
          </imx-service-item-tags>
        }
        @for (cdr of cdrListServiceItem; track cdr) {
          <imx-cdr-editor
            [cdr]="cdr"
            (controlCreated)="form.addControl(cdr?.column?.ColumnName || '', $event)"
            >
          </imx-cdr-editor>
        }
      }
    </form>
  </mat-card>
</div>
<div eui-sidesheet-actions>
  @if (isEditableEntitlement) {
    <button
      mat-flat-button
      data-imx-identifier="entitlement-edit-details-button"
      type="button"
      (click)="manageEntitlement()"
      color="primary"
      >
      {{ '#LDS#Manage system role' | translate }}
    </button>
  }
  <button
    mat-flat-button
    data-imx-identifier="entitlement-edit-button-save"
    [disabled]="!form.dirty"
    type="button"
    (click)="save()"
    color="primary"
    >
    {{ '#LDS#Save' | translate }}
  </button>
</div>
