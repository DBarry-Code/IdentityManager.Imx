<div eui-sidesheet-content>
@if(isLoading){
  <imx-busy-indicator class="imx-busy-loader"></imx-busy-indicator>
}
<mat-card class="imx-card-fill imx-margin-bottom-16" [ngClass]="{ hidden: isLoading }">
  <form [formGroup]="dugResourceFormGroup">
    @for(cdr of cdrOwnerShip; track cdr){
      <imx-cdr-editor [cdr]="cdr"
        (controlCreated)="dugResourceFormGroup.controls.array.push($event)" (valueChange) = "savePersonResponsible($event)"></imx-cdr-editor>
    }
  </form>
</mat-card>
</div>
<div eui-sidesheet-actions>
  <button mat-flat-button [disabled]="saveDisabled" color="primary" (click)="save()">
      {{ '#LDS#Save' | translate }}
  </button>
</div>
