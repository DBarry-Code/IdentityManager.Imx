<mat-tab-group>
  <mat-tab label="{{'#LDS#Access analysis on {0}' | translate | ldsReplace: displayResource}}">
    <ng-template matTabContent>
      <imx-dge-access-detail [dug]="dug"></imx-dge-access-detail>
    </ng-template>
  </mat-tab>
  @if (dugBackingFolder) {
    <mat-tab [label]="'#LDS#Access analysis on backing folder permissions' | translate">
      <ng-template matTabContent>
        <imx-dge-access-detail [dug]="dugBackingFolder"></imx-dge-access-detail>
      </ng-template>
    </mat-tab>
  }

  <mat-tab [label]="'#LDS#Access Detail' | translate">
    <h2 class="imx-margin-vertical-10">{{ldsAccess | translate}}</h2>
    <imx-data-view-toolbar [dataSource]="dataSource" [showSettings]="false"></imx-data-view-toolbar>
    <div class="data-explorer-table">
      <imx-data-view-auto-table [dataSource]="dataSource" mode="auto"></imx-data-view-auto-table>
      <imx-data-view-paginator [dataSource]="dataSource"></imx-data-view-paginator>
    </div>
  </mat-tab>
</mat-tab-group>
